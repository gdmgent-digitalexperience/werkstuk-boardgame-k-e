<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Area 51 - Gelukt</title>
    <style>
        .symbool-wrapper {
            margin: 1rem auto 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
        }
        .symbool-svg {
            filter: drop-shadow(0 0 12px #00cc44);
        }
        .symbool-naam {
            font-family: 'Oswald', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.25rem;
            text-transform: uppercase;
            color: #00cc44;
        }
        .symbool-label {
            font-family: 'Special Elite', cursive;
            color: #aaaaaa;
            font-size: 0.82rem;
            margin-top: 0.2rem;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <main class="container">

        <header class="logo-sectie">
            <i class="fa-solid fa-user-secret logo-icoon"></i>
            <h1 class="titel">AREA 51</h1>
            <p class="subtitel">Missie Geslaagd</p>
        </header>

        <section class="resultaat-sectie gelukt">
            <i class="fa-solid fa-lock-open resultaat-icoon"></i>
            <h2 class="resultaat-titel">GELUKT!</h2>
            <p class="resultaat-tekst">De code is gekraakt. Toegang verleend.<br>Je hebt het volgende symbool vrijgespeeld:</p>

            <div class="symbool-wrapper">
                <svg id="symboolSvg" class="symbool-svg" width="80" height="80" viewBox="0 0 80 80"></svg>
                <span class="symbool-naam" id="symboolNaam"></span>
                <span class="symbool-label" id="symboolLabel"></span>
            </div>

            <a href="overzicht.html" class="btn-terug">
                <i class="fa-solid fa-arrow-left"></i> Terug naar overzicht
            </a>
        </section>

    </main>

    <footer>
        <p class="footer-tekst">Area 51 &mdash; Restricted File</p>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const punt = params.get('punt') || '?';
        const symbool = params.get('symbool') || 'cirkel';

        const svg = document.getElementById('symboolSvg');
        const naamEl = document.getElementById('symboolNaam');
        const labelEl = document.getElementById('symboolLabel');

        const GROEN = '#00cc44';
        const STROKE = 3;

        const symbolen = {
            cirkel: {
                naam: 'Cirkel',
                label: 'Punt 1 — Symbool vrijgespeeld',
                teken: `<circle cx="40" cy="40" r="32" fill="none" stroke="${GROEN}" stroke-width="${STROKE}"/>`
            },
            zeshoek: {
                naam: 'Zeshoek',
                label: 'Punt 2 — Symbool vrijgespeeld',
                teken: `<polygon points="40,6 72,22 72,58 40,74 8,58 8,22" fill="none" stroke="${GROEN}" stroke-width="${STROKE}"/>`
            },
            vierkant: {
                naam: 'Vierkant',
                label: 'Punt 3 — Symbool vrijgespeeld',
                teken: `<rect x="10" y="10" width="60" height="60" fill="none" stroke="${GROEN}" stroke-width="${STROKE}"/>`
            },
            ster: {
                naam: 'Ster',
                label: 'Punt 4 — Symbool vrijgespeeld',
                teken: `<polygon points="40,5 49,32 78,32 55,50 63,77 40,60 17,77 25,50 2,32 31,32" fill="none" stroke="${GROEN}" stroke-width="${STROKE}"/>`
            },
            rechthoek: {
                naam: 'Rechthoek',
                label: 'Punt 5 — Symbool vrijgespeeld',
                teken: `<rect x="8" y="20" width="64" height="40" fill="none" stroke="${GROEN}" stroke-width="${STROKE}"/>`
            },
            driehoek: {
                naam: 'Driehoek',
                label: 'Punt 6 — Symbool vrijgespeeld',
                teken: `<polygon points="40,6 74,72 6,72" fill="none" stroke="${GROEN}" stroke-width="${STROKE}"/>`
            }
        };

        const data = symbolen[symbool] || symbolen['cirkel'];
        svg.innerHTML = data.teken;
        naamEl.textContent = data.naam;
        labelEl.textContent = data.label;
    </script>

</body>
</html>
